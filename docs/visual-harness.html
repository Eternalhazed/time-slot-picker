<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Time Slot Picker — Visual Harness</title>
<link rel="stylesheet" href="../extension/sidebar.css">
<style>
  html, body {
    margin: 0;
    background: #ffffff;
    color: #1f2933;
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    min-height: 100vh;
  }
  /* Fake Google Calendar grid */
  .gc-shell {
    display: grid;
    grid-template-rows: 56px 80px 1fr;
    grid-template-columns: 64px 1fr;
    height: 100vh;
    background: #f8fafc;
  }
  .gc-bar {
    grid-column: 1 / -1;
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-weight: 700;
    color: #475569;
  }
  .gc-rail {
    background: #ffffff;
    border-right: 1px solid #e5e7eb;
  }
  .gc-header {
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .gc-day {
    border-right: 1px solid #e5e7eb;
    padding: 8px 6px;
    text-align: center;
    color: #475569;
  }
  .gc-day strong {
    display: block;
    color: #0f172a;
    font-size: 22px;
    margin-top: 2px;
  }
  .gc-grid {
    grid-column: 2 / -1;
    background: #ffffff;
    background-image:
      linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
    background-size: 100% 60px;
    position: relative;
    overflow: hidden;
  }
  .gc-hours {
    position: absolute;
    inset: 0 auto 0 -64px;
    width: 60px;
    text-align: right;
    padding-right: 6px;
    font-size: 11px;
    color: #94a3b8;
  }
  .gc-hours span {
    position: absolute;
    right: 6px;
    transform: translateY(-50%);
  }
  /* Scenario chooser */
  .scenarios {
    position: fixed;
    left: 12px;
    top: 12px;
    z-index: 2147483647;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    max-width: 460px;
  }
  .scenarios button {
    background: #0f172a;
    color: white;
    border: 0;
    padding: 6px 10px;
    border-radius: 6px;
    font: 11px/1 monospace;
    cursor: pointer;
  }
  .scenarios button.is-active {
    background: #2563eb;
  }
  .viewport-hint {
    position: fixed;
    left: 12px;
    bottom: 12px;
    z-index: 2147483647;
    background: rgba(15, 23, 42, 0.8);
    color: white;
    font: 11px/1 monospace;
    padding: 6px 10px;
    border-radius: 6px;
  }
</style>
</head>
<body>
<div class="gc-shell">
  <div class="gc-bar">Calendar — May 11–17, 2099 · Mock</div>
  <div class="gc-rail"></div>
  <div class="gc-header">
    <div class="gc-day" role="columnheader" data-date="2099-05-11">MON<strong>11</strong></div>
    <div class="gc-day" role="columnheader" data-date="2099-05-12">TUE<strong>12</strong></div>
    <div class="gc-day" role="columnheader" data-date="2099-05-13">WED<strong>13</strong></div>
    <div class="gc-day" role="columnheader" data-date="2099-05-14">THU<strong>14</strong></div>
    <div class="gc-day" role="columnheader" data-date="2099-05-15">FRI<strong>15</strong></div>
    <div class="gc-day" role="columnheader" data-date="2099-05-16">SAT<strong>16</strong></div>
    <div class="gc-day" role="columnheader" data-date="2099-05-17">SUN<strong>17</strong></div>
  </div>
  <div class="gc-grid" data-tsp-time-grid>
    <div class="gc-hours">
      <span data-tsp-hour-label style="top:60px">8 AM</span>
      <span data-tsp-hour-label style="top:120px">9 AM</span>
      <span data-tsp-hour-label style="top:180px">10 AM</span>
      <span data-tsp-hour-label style="top:240px">11 AM</span>
      <span data-tsp-hour-label style="top:300px">12 PM</span>
      <span data-tsp-hour-label style="top:360px">1 PM</span>
      <span data-tsp-hour-label style="top:420px">2 PM</span>
      <span data-tsp-hour-label style="top:480px">3 PM</span>
      <span data-tsp-hour-label style="top:540px">4 PM</span>
      <span data-tsp-hour-label style="top:600px">5 PM</span>
    </div>
  </div>
</div>

<div class="scenarios" id="scenarios"></div>
<div class="viewport-hint" id="vp-hint"></div>

<script>
  const scenarios = {
    fresh: {
      label: "Fresh install",
      state: {
        accountScopes: {},
        calendarTimezone: "America/Los_Angeles",
        outputTimezone: "America/Los_Angeles",
        lastDuration: 30,
        sidebarOpen: true,
        selectModeOn: false,
        autoDetectTimezone: true,
        formatOptions: { clock: "12h", includeDate: true, includeZoneLabel: true, excludePast: true },
        uiSections: { timezones: false, format: false, shortcuts: false }
      }
    },
    selecting: {
      label: "Selecting + slots",
      state: {
        accountScopes: {
          default: {
            selections: [
              { id: "a", startUTC: "2099-05-13T16:00:00.000Z", endUTC: "2099-05-13T16:30:00.000Z" },
              { id: "b", startUTC: "2099-05-13T20:00:00.000Z", endUTC: "2099-05-13T21:00:00.000Z" },
              { id: "c", startUTC: "2099-05-14T17:30:00.000Z", endUTC: "2099-05-14T18:00:00.000Z" },
              { id: "d", startUTC: "2099-05-15T15:00:00.000Z", endUTC: "2099-05-15T16:00:00.000Z" }
            ]
          }
        },
        calendarTimezone: "America/New_York",
        outputTimezone: "America/Los_Angeles",
        lastDuration: 30,
        sidebarOpen: true,
        selectModeOn: true,
        autoDetectTimezone: false,
        formatOptions: { clock: "12h", includeDate: true, includeZoneLabel: true, excludePast: true },
        uiSections: { timezones: true, format: false, shortcuts: false }
      }
    },
    crossZone: {
      label: "Cross-timezone copy",
      state: {
        accountScopes: {
          default: {
            selections: [
              { id: "a", startUTC: "2099-05-13T14:00:00.000Z", endUTC: "2099-05-13T14:30:00.000Z" },
              { id: "b", startUTC: "2099-05-13T19:00:00.000Z", endUTC: "2099-05-13T19:45:00.000Z" }
            ]
          }
        },
        calendarTimezone: "America/Los_Angeles",
        outputTimezone: "Europe/London",
        lastDuration: 45,
        sidebarOpen: true,
        selectModeOn: false,
        autoDetectTimezone: false,
        formatOptions: { clock: "24h", includeDate: true, includeZoneLabel: true, excludePast: true },
        uiSections: { timezones: true, format: true, shortcuts: false }
      }
    },
    mixedPast: {
      label: "Past + future mixed",
      state: {
        accountScopes: {
          default: {
            selections: [
              { id: "p1", startUTC: "2020-01-01T15:00:00.000Z", endUTC: "2020-01-01T16:00:00.000Z" },
              { id: "p2", startUTC: "2020-01-02T15:00:00.000Z", endUTC: "2020-01-02T16:00:00.000Z" },
              { id: "f1", startUTC: "2099-05-14T14:00:00.000Z", endUTC: "2099-05-14T14:30:00.000Z" },
              { id: "f2", startUTC: "2099-05-15T17:00:00.000Z", endUTC: "2099-05-15T18:00:00.000Z" }
            ]
          }
        },
        calendarTimezone: "America/Chicago",
        outputTimezone: "America/Chicago",
        lastDuration: 30,
        sidebarOpen: true,
        selectModeOn: false,
        autoDetectTimezone: false,
        formatOptions: { clock: "12h", includeDate: true, includeZoneLabel: true, excludePast: true },
        uiSections: { timezones: false, format: false, shortcuts: false }
      }
    },
    capacityWarn: {
      label: "Many slots (60)",
      state: {
        accountScopes: {
          default: {
            selections: Array.from({ length: 60 }, (_, i) => ({
              id: "s" + i,
              startUTC: new Date(Date.UTC(2099, 4, 12 + (i % 5), 14 + (i % 8), (i % 4) * 15, 0)).toISOString(),
              endUTC:   new Date(Date.UTC(2099, 4, 12 + (i % 5), 14 + (i % 8), (i % 4) * 15 + 30, 0)).toISOString()
            }))
          }
        },
        calendarTimezone: "America/New_York",
        outputTimezone: "America/New_York",
        lastDuration: 30,
        sidebarOpen: true,
        selectModeOn: true,
        autoDetectTimezone: false,
        formatOptions: { clock: "12h", includeDate: true, includeZoneLabel: true, excludePast: true },
        uiSections: { timezones: false, format: false, shortcuts: false }
      }
    },
    errorState: {
      label: "Error status",
      state: {
        accountScopes: {},
        calendarTimezone: "America/Chicago",
        outputTimezone: "America/Chicago",
        lastDuration: 30,
        sidebarOpen: true,
        selectModeOn: true,
        autoDetectTimezone: true,
        formatOptions: { clock: "12h", includeDate: true, includeZoneLabel: true, excludePast: true },
        uiSections: { timezones: false, format: false, shortcuts: false }
      },
      after: function () {
        document.querySelector(".tsp-status").textContent = "Time grid not detected. Retrying...";
        document.querySelector(".tsp-status").dataset.kind = "error";
      }
    },
    collapsed: {
      label: "Collapsed tab",
      state: {
        accountScopes: {
          default: {
            selections: [
              { id: "a", startUTC: "2099-05-13T16:00:00.000Z", endUTC: "2099-05-13T16:30:00.000Z" },
              { id: "b", startUTC: "2099-05-14T17:00:00.000Z", endUTC: "2099-05-14T18:00:00.000Z" }
            ]
          }
        },
        calendarTimezone: "America/Los_Angeles",
        outputTimezone: "America/Los_Angeles",
        lastDuration: 30,
        sidebarOpen: false,
        selectModeOn: false,
        autoDetectTimezone: true,
        formatOptions: { clock: "12h", includeDate: true, includeZoneLabel: true, excludePast: true },
        uiSections: { timezones: false, format: false, shortcuts: false }
      }
    }
  };

  // Mock chrome.storage so the extension thinks it's running.
  const stored = { timeSlotPicker: scenarios.fresh.state };
  window.chrome = {
    runtime: { lastError: null, onMessage: { addListener: () => {} } },
    storage: {
      local: {
        get: (_k, cb) => cb({ timeSlotPicker: JSON.parse(JSON.stringify(stored.timeSlotPicker)) }),
        set: (payload, cb) => { Object.assign(stored, payload); cb && cb(); }
      },
      onChanged: { addListener: () => {} }
    }
  };

  function loadScript(src) {
    return new Promise(function (resolve) {
      const s = document.createElement("script");
      s.src = src;
      s.onload = resolve;
      document.head.appendChild(s);
    });
  }

  async function bootScenario(key) {
    // Reset state.
    delete window.__timeSlotPickerBooted;
    document.querySelectorAll("#tsp-root, .tsp-capture-overlay").forEach((n) => n.remove());
    stored.timeSlotPicker = JSON.parse(JSON.stringify(scenarios[key].state));

    if (!window.TimeSlotPickerUtils) {
      await loadScript("../extension/time-utils.js");
      await loadScript("../extension/storage.js");
      await loadScript("../extension/grid-anchor.js");
      await loadScript("../extension/capture-overlay.js");
    }
    // Always re-load content.js to re-init.
    const old = document.getElementById("tsp-content-script");
    if (old) old.remove();
    const tag = document.createElement("script");
    tag.id = "tsp-content-script";
    tag.src = "../extension/content.js?ts=" + Date.now();
    document.head.appendChild(tag);

    await new Promise(function (r) { setTimeout(r, 80); });

    if (typeof scenarios[key].after === "function") {
      scenarios[key].after();
    }

    document.querySelectorAll(".scenarios button").forEach(function (b) {
      b.classList.toggle("is-active", b.dataset.key === key);
    });
  }

  const bar = document.getElementById("scenarios");
  Object.keys(scenarios).forEach(function (key) {
    const btn = document.createElement("button");
    btn.dataset.key = key;
    btn.textContent = scenarios[key].label;
    btn.onclick = function () { bootScenario(key); };
    bar.appendChild(btn);
  });

  function updateVpHint() {
    document.getElementById("vp-hint").textContent =
      "viewport: " + window.innerWidth + " × " + window.innerHeight;
  }
  window.addEventListener("resize", updateVpHint);
  updateVpHint();

  const initialScenario = new URLSearchParams(window.location.search).get("scenario");
  bootScenario(scenarios[initialScenario] ? initialScenario : "fresh");
</script>
</body>
</html>
